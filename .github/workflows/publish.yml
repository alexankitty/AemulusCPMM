name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT: AemulusModManager.Avalonia.csproj

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Windows x64
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -o publish/win-x64

      - name: Create Windows archive
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath AemulusPackageManager-win-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AemulusPackageManager-win-x64
          path: AemulusPackageManager-win-x64.zip

  publish-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Linux x64
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r linux-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -o publish/linux-x64

      - name: Create Linux archive
        run: tar -czf AemulusPackageManager-linux-x64.tar.gz -C publish/linux-x64 .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AemulusPackageManager-linux-x64
          path: AemulusPackageManager-linux-x64.tar.gz

  publish-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libfuse2

      - name: Publish Linux x64
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r linux-x64
          -p:PublishSingleFile=false
          -p:SelfContained=true
          -o publish/linux-x64

      - name: Build AppImage
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy published output
          cp -r publish/linux-x64/* AppDir/usr/bin/

          # Convert .ico to .png for AppImage icon (use largest frame)
          convert 'Assets/Aemulus.ico[7]' AppDir/AemulusPackageManager.png
          cp AppDir/AemulusPackageManager.png AppDir/usr/share/icons/hicolor/256x256/apps/AemulusPackageManager.png

          # Generate desktop file
          cat > AppDir/AemulusPackageManager.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Aemulus Package Manager
          Comment=Manage modding packages for Persona games
          Exec=AemulusPackageManager
          Icon=AemulusPackageManager
          Categories=Game;Utility;
          Terminal=false
          StartupWMClass=AemulusPackageManager
          EOF

          # Generate AppRun
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/AemulusPackageManager" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          chmod +x AppDir/usr/bin/AemulusPackageManager

          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Build AppImage
          ARCH=x86_64 ./appimagetool AppDir AemulusPackageManager-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: AemulusPackageManager-AppImage
          path: AemulusPackageManager-x86_64.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-windows, publish-linux, publish-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/AemulusPackageManager-win-x64/AemulusPackageManager-win-x64.zip
            artifacts/AemulusPackageManager-linux-x64/AemulusPackageManager-linux-x64.tar.gz
            artifacts/AemulusPackageManager-AppImage/AemulusPackageManager-x86_64.AppImage
